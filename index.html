    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --radius: 10px; --radius-lg: 14px; --radius-xl: 18px;

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

      content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,106,247,0.08) 0%, transparent 60%),

      pointer-events: none;
    }
    #root { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 14px; }

    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: var(--glass2); border: 0.5px solid var(--border2);
      border-radius: var(--radius-xl); margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(124,106,247,0.3), rgba(45,212,191,0.2));
      border: 0.5px solid rgba(124,106,247,0.4);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .header-text h1 { font-size: 14px; font-weight: 600; }
    .header-text p  { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .xp-badge {
      padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .xp-badge.active  { background: var(--success-bg); border: 0.5px solid rgba(74,222,128,0.3); color: var(--success); }
    .xp-badge.partial { background: var(--warn-bg);    border: 0.5px solid rgba(251,191,36,0.3); color: var(--warn); }
    .lang-btn { display: flex; border-radius: 20px; overflow: hidden; border: 0.5px solid var(--border2); }
    .lang-opt {
      padding: 5px 10px; font-size: 11px; font-weight: 500; cursor: pointer;
      background: transparent; border: none; color: var(--text2); font-family: 'Inter',sans-serif; transition: all 0.15s;
    }
    .lang-opt.active { background: rgba(124,106,247,0.25); color: #a78bfa; }

    .region-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
      border: 0.5px solid var(--border); background: var(--glass); color: var(--text3); transition: all 0.2s;
    }
    .pill.active { color: var(--pc); background: var(--pbg); border-color: var(--pbd); }

    .layout { display: grid; grid-template-columns: 1fr 1.3fr; gap: 12px; }
    @media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }
    .card { background: var(--glass); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; }
    .card-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
    .mb10 { margin-bottom: 10px; }

    .emblem-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .emblem-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-radius: 8px; font-size: 11px; cursor: pointer;
      background: var(--glass); border: 0.5px solid var(--border);
      color: var(--text2); font-family: 'Inter',sans-serif; transition: all 0.12s;
    }
    .emblem-btn:hover { border-color: var(--border2); color: var(--text); }
    .emblem-btn.active { color: var(--pc); background: var(--pbg); border-color: var(--pbd); font-weight: 500; }
    .emblem-icon {
      width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0;
      background: var(--pbg); border: 0.5px solid var(--pbd);
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }

    .sugg-header { font-size: 12px; font-weight: 500; color: var(--warn); margin-bottom: 8px; }
    .sugg-row {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 9px; border-radius: var(--radius); margin-bottom: 5px;
      border: 0.5px solid var(--border); transition: background 0.1s;

    .sugg-row.top { border-color: var(--warn); background: var(--warn-bg); }
    .sugg-rank { font-size: 10px; color: var(--text3); min-width: 14px; text-align: center; }
    .sugg-picks { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
    .sugg-pick {
      display: inline-flex; align-items: center; gap: 4px;

    .no-sugg { font-size: 12px; color: var(--text3); text-align: center; padding: 20px 0; }

    .search-input {
      width: 100%; padding: 7px 10px; font-size: 12px; font-family: 'Inter',sans-serif;
      border-radius: var(--radius); border: 0.5px solid var(--border2);
      background: var(--glass2); color: var(--text); outline: none; margin-bottom: 8px;
    }
    .search-input:focus { border-color: rgba(124,106,247,0.5); }
    .filter-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .filter-btn {
      display: flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 6px; font-size: 10px; cursor: pointer;
      background: transparent; border: 0.5px solid var(--border); color: var(--text2);
      font-family: 'Inter',sans-serif; transition: all 0.1s;

    .filter-btn:hover { border-color: var(--border2); color: var(--text); }
    .filter-btn.factive { background: var(--glass2); border-color: var(--border2); color: var(--text); font-weight: 500; }
    .filter-btn.fregion { color: var(--pc); border-color: var(--pbd); background: var(--pbg); font-weight: 500; }

    .champ-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 5px; max-height: 450px; overflow-y: auto; padding-right: 2px;
    }
    .champ-grid::-webkit-scrollbar { width: 3px; }
    .champ-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .champ-btn {
      position: relative; border-radius: var(--radius); cursor: pointer; text-align: center;
      background: var(--glass); border: 0.5px solid var(--border);
      color: var(--text2); transition: all 0.12s; font-family: 'Inter',sans-serif; overflow: hidden; padding-bottom: 5px;

    .champ-btn:hover { border-color: var(--border2); }
    .champ-btn.selected { border: 1.5px solid var(--pbd); background: var(--pbg); color: var(--pc); }
    .champ-btn.suggested { border: 1.5px dashed var(--warn); background: var(--warn-bg); color: var(--warn); }
    .champ-cost-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .champ-img-wrap { width: 100%; aspect-ratio: 1; overflow: hidden; background: var(--glass2); position: relative; }
    .champ-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; transition: transform 0.2s; }
    .champ-btn:hover .champ-img { transform: scale(1.06); }
    .champ-fb {

    .sel-badge {

const regMap   = Object.fromEntries(REGIONS.map(r => [r.id, r]));
const champMap = Object.fromEntries(CHAMPS.map(c => [c.id, c]));

function combos(arr, k) {
  if (k===0) return [[]];
  if (arr.length<k) return [];
  const [f,...rest]=arr;
  return [...combos(rest,k-1).map(c=>[f,...c]),...combos(rest,k)];
}
function analyze(sel, emblems) {
  const cov=new Set();
  sel.forEach(id=>{const c=champMap[id];if(c)cov.add(c.r);});
  emblems.forEach(r=>cov.add(r));
  if(cov.size>=4) return {done:true,covered:[...cov]};
  const need=4-cov.size;
  const unco=REGIONS.map(r=>r.id).filter(id=>!cov.has(id));
  const byR={};
  unco.forEach(rid=>{byR[rid]=CHAMPS.filter(c=>c.r===rid&&!sel.has(c.id)).sort((a,b)=>a.c-b.c);});
  const suggs=combos(unco,need)
    .map(combo=>{
      const picks=combo.map(rid=>({rid,champ:byR[rid]?.[0]}));
      if(picks.some(p=>!p.champ))return null;
      return{picks,total:picks.reduce((s,p)=>s+p.champ.c,0)};
    })
    .filter(Boolean).sort((a,b)=>a.total-b.total).slice(0,6);
  return{done:false,covered:[...cov],need,suggs};
}

function ChampImg({id, size='100%', radius=0, extraStyle={}}) {
  const [err,setErr]=useState(false);
  const url=DDR[id]?DDR_BASE+DDR[id]+'.png':null;
  const rg=regMap[champMap[id]?.r];
  if(!url||err) return h('div',{style:{width:size,height:size,borderRadius:radius,
    background:rg?.bg||'rgba(255,255,255,0.05)',display:'flex',alignItems:'center',
    justifyContent:'center',fontSize:18,...extraStyle}},rg?.icon||'?');
  return h('img',{src:url,alt:id,
    style:{width:size,height:size,borderRadius:radius,objectFit:'cover',
      objectPosition:'top center',display:'block',...extraStyle},
    onError:()=>setErr(true)});
}

function App() {
  const [lang,setLang]=useState('vi');
  const [sel,setSel]=useState(new Set());
  const [emblems,setEmblems]=useState(new Set());
  const [filterR,setFilterR]=useState('all');
  const [search,setSearch]=useState('');
  const t=T[lang];

  const result=useMemo(()=>analyze(sel,emblems),[sel,emblems]);
  const covered=useMemo(()=>{
    const s=new Set();
    sel.forEach(id=>{const c=champMap[id];if(c)s.add(c.r);});
    emblems.forEach(r=>s.add(r));
    return s;
  },[sel,emblems]);
  const topIds=useMemo(()=>{
    if(result.done||!result.suggs?.length)return new Set();
    return new Set(result.suggs[0].picks.map(p=>p.champ.id));
  },[result]);
  const filtered=useMemo(()=>CHAMPS.filter(c=>
    (filterR==='all'||c.r===filterR)&&(!search||c.n.toLowerCase().includes(search.toLowerCase()))
  ),[filterR,search]);

  const toggle=useCallback(id=>setSel(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;}),[]);
  const toggleE=useCallback(r=>setEmblems(p=>{const n=new Set(p);n.has(r)?n.delete(r):n.add(r);return n;}),[]);
  const clearAll=()=>{setSel(new Set());setEmblems(new Set());};

  return h('div',null,
    // Header
    h('div',{className:'app-header'},
      h('div',{className:'header-left'},
        h('div',{className:'header-icon'},'⚡'),
        h('div',{className:'header-text'},
          h('h1',null,t.title),
          h('p',null,t.sub)
        )
      ),
      h('div',{className:'header-right'},
        h('div',{className:'xp-badge '+(covered.size>=4?'active':'partial')},
          covered.size>=4?t.xpActive:t.xpPartial(covered.size)
        ),
        h('div',{className:'lang-btn'},
          h('button',{className:'lang-opt'+(lang==='vi'?' active':''),onClick:()=>setLang('vi')},'VI'),
          h('button',{className:'lang-opt'+(lang==='en'?' active':''),onClick:()=>setLang('en')},'EN')
        )
      )
    ),

    // Progress pills
    h('div',{className:'region-pills'},
      REGIONS.map(r=>h('div',{key:r.id,
        className:'pill'+(covered.has(r.id)?' active':''),
        style:{'--pc':r.color,'--pbg':r.bg,'--pbd':r.bd}},
        r.icon,' ',lang==='vi'?r.vi:r.en
      ))
    ),

    // Layout
    h('div',{className:'layout'},

      // Left column
      h('div',null,
        // Emblems
        h('div',{className:'card mb10'},
          h('div',{className:'card-title'},t.emblems),
          h('div',{className:'emblem-grid'},
            REGIONS.map(r=>{
              const act=emblems.has(r.id);
              return h('button',{key:r.id,
                className:'emblem-btn'+(act?' active':''),
                style:{'--pc':r.color,'--pbg':r.bg,'--pbd':r.bd},
                onClick:()=>toggleE(r.id)},
                h('span',{className:'emblem-icon',style:{'--pbg':r.bg,'--pbd':r.bd}},r.icon),
                (lang==='vi'?t.emblemPfx:'')+(lang==='vi'?r.vi:r.en)
              );
            })
          )
        ),

        // Suggestions
        h('div',{className:'card'},
          result.done
            ? h('div',{className:'done-box'},t.done)
            : h('div',null,
                h('div',{className:'sugg-header'},
                  result.need?t.needMore(result.need)+' — '+t.suggestions:t.suggestions
                ),
                result.suggs?.length
                  ? result.suggs.map((sg,i)=>
                      h('div',{key:i,className:'sugg-row'+(i===0?' top':'')},
                        h('span',{className:'sugg-rank'},i===0?'★':i+1),
                        h('div',{className:'sugg-picks'},
                          sg.picks.map(p=>{
                            const rg=regMap[p.rid];
                            return h('div',{key:p.champ.id,className:'sugg-pick',
                              style:{'--pc':rg.color,'--pbg':rg.bg,'--pbd':rg.bd}},
                              h(ChampImg,{id:p.champ.id,size:'18px',radius:3}),
                              h('span',{className:'sugg-pick-cost '+COST_CLS[p.champ.c]},p.champ.c+'★'),
                              p.champ.n,
                              h('span',{style:{fontSize:9,opacity:0.6}},' '+rg.icon)
                            );
                          })
                        ),
                        h('span',{className:'sugg-total'},sg.total+t.gold)
                      )
                    )
                  : h('div',{className:'no-sugg'},t.noSugg)
              )
        )
      ),

      // Right column — champ selector
      h('div',{className:'card'},
        h('div',{className:'row-between'},
          h('div',{className:'card-title',style:{margin:0}},t.champPanel(sel.size)),
          (sel.size+emblems.size>0)&&h('button',{className:'clear-btn',onClick:clearAll},t.clearAll)
        ),
        h('input',{className:'search-input',placeholder:t.search,
          value:search,onChange:e=>setSearch(e.target.value)}),
        h('div',{className:'filter-row'},
          h('button',{className:'filter-btn'+(filterR==='all'?' factive':''),onClick:()=>setFilterR('all')},t.all),
          REGIONS.map(r=>{
            const act=filterR===r.id;
            return h('button',{key:r.id,
              className:'filter-btn'+(act?' fregion':''),
              style:act?{'--pc':r.color,'--pbg':r.bg,'--pbd':r.bd}:{},
              onClick:()=>setFilterR(filterR===r.id?'all':r.id)},
              r.icon,' ',lang==='vi'?r.vi:r.en
            );
          })
        ),
        h('div',{className:'champ-grid'},
          filtered.map(ch=>{
            const isSel=sel.has(ch.id), isSugg=topIds.has(ch.id)&&!isSel;
            const rg=regMap[ch.r];
            return h('button',{key:ch.id,
              className:'champ-btn'+(isSel?' selected':isSugg?' suggested':''),
              style:{'--pc':rg.color,'--pbg':rg.bg,'--pbd':rg.bd},
              onClick:()=>toggle(ch.id)},
              h('div',{className:'champ-cost-bar',style:{background:COST_COLOR[ch.c]}}),
              h('div',{className:'champ-img-wrap'},
                h(ChampImg,{id:ch.id,size:'100%'})
              ),
              h('div',{className:'champ-name'},ch.n),
              h('div',{className:'champ-meta'},
                h('span',{className:'champ-cost-txt '+COST_CLS[ch.c]},'★'.repeat(ch.c)),
                ' ',rg.icon
              ),
              isSel&&h('div',{className:'sel-badge'},
                h('svg',{viewBox:'0 0 10 10',width:8,height:8},
                  h('polyline',{points:'2,5 4,8 8,2',stroke:'#000',strokeWidth:1.5,fill:'none',strokeLinecap:'round'}))
              ),
              isSugg&&h('div',{className:'sugg-badge'},lang==='vi'?'GỢI Ý':'PICK')
            );
          })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
