<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TFT — Lõi XP 4 Tộc Khu Vực</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c14;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --tx:#e8e6f0;--tx2:#8a87a0;--tx3:#4a4860;
  --ok:#4ade80;--okb:rgba(74,222,128,.1);--okbd:rgba(74,222,128,.3);
  --w:#fbbf24;--wb:rgba(251,191,36,.1);--wbd:rgba(251,191,36,.3);
  --info:#93c5fd;--infob:rgba(147,197,253,.1);
  --danger:#f87171;--r:10px;--rl:14px;--rxl:18px;
}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(124,106,247,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(45,212,191,.04) 0%,transparent 60%)}
#root{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:14px}
button{outline:none;font-family:"Inter",sans-serif}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:12px 16px;background:var(--s2);border:.5px solid var(--b2);border-radius:var(--rxl);margin-bottom:12px}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(124,106,247,.3),rgba(45,212,191,.2));
  border:.5px solid rgba(124,106,247,.4);display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr-h1{font-size:14px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.xp-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.xp-on{background:var(--okb);border:.5px solid var(--okbd);color:var(--ok)}
.xp-off{background:var(--wb);border:.5px solid var(--wbd);color:var(--w)}
.lang-btn{display:flex;border-radius:20px;overflow:hidden;border:.5px solid var(--b2)}
.lo{padding:5px 10px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--tx2);transition:all .15s}
.lo.on{background:rgba(124,106,247,.25);color:#a78bfa}
.rpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.rp{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:500;border:.5px solid var(--b1);background:var(--s1);color:var(--tx3);transition:all .2s}
.rp.done{color:var(--pc);background:var(--pbg);border-color:var(--pbd)}
.rp.part{color:var(--w);background:var(--wb);border-color:var(--wbd)}
.rp-cnt{font-size:9px;font-weight:700}
.rp-min{font-size:9px;opacity:.45}
.board-view{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rl);padding:12px 14px;margin-bottom:12px}
.bv-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:10px}
.bv-regs{display:flex;flex-wrap:wrap;gap:10px}
.bv-reg-hdr{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.bv-reg-name{font-size:10px;font-weight:500}
.bv-cnt{font-size:9px;padding:1px 5px;border-radius:20px;font-weight:600}
.bv-cnt.done{background:var(--okb);color:var(--ok);border:.5px solid var(--okbd)}
.bv-cnt.part{background:var(--wb);color:var(--w);border:.5px solid var(--wbd)}
.bv-champs{display:flex;flex-wrap:wrap;gap:4px}
.bv-ch{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;font-size:10px;background:var(--pbg);border:.5px solid var(--pbd);color:var(--pc)}
.bv-ch img{width:16px;height:16px;border-radius:3px;object-fit:cover;background:var(--s2);flex-shrink:0}
.layout{display:grid;grid-template-columns:1fr 1.35fr;gap:12px}
@media(max-width:640px){.layout{grid-template-columns:1fr}}
.card{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rl);padding:12px 14px}
.card-ttl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:10px}
.mb10{margin-bottom:10px}
.emb-grid{display:flex;flex-wrap:wrap;gap:5px}
.eb{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:8px;font-size:11px;cursor:pointer;background:var(--s1);border:.5px solid var(--b1);color:var(--tx2);transition:all .12s}
.eb:hover{border-color:var(--b2);color:var(--tx)}
.eb.on{color:var(--pc);background:var(--pbg);border-color:var(--pbd);font-weight:500}
.eb-icon{width:20px;height:20px;border-radius:4px;flex-shrink:0;background:var(--pbg);border:.5px solid var(--pbd);display:flex;align-items:center;justify-content:center;font-size:11px}
.gf{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:9px 12px;margin-bottom:10px}
.gf-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.gf-lbl{font-size:11px;color:var(--tx2)}
.gf-val{font-size:12px;font-weight:600;color:var(--w)}
.gf-btns{display:flex;flex-wrap:wrap;gap:4px}
.gfb{padding:3px 9px;border-radius:6px;font-size:11px;cursor:pointer;background:transparent;border:.5px solid var(--b1);color:var(--tx2);transition:all .1s}
.gfb.on{background:var(--wb);border-color:rgba(251,191,36,.4);color:var(--w);font-weight:500}
.opt-board{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px}
.opt-tabs{display:flex;gap:4px;margin-bottom:10px}
.ot{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;background:transparent;border:.5px solid var(--b1);color:var(--tx2);transition:all .1s}
.ot.on{background:var(--s2);border-color:var(--b2);color:var(--tx);font-weight:500}
.orow{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:var(--r);margin-bottom:5px;border:.5px solid var(--b1)}
.orow:last-child{margin-bottom:0}
.orow.top{border-color:var(--info);background:var(--infob)}
.orank{font-size:10px;color:var(--tx3);min-width:14px;text-align:center}
.opicks{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.opick{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;font-size:10px;color:var(--pc);background:var(--pbg);border:.5px solid var(--pbd)}
.opick img{width:16px;height:16px;border-radius:3px;object-fit:cover;background:var(--s2)}
.ocost{font-size:9px;font-weight:700}
.ototl{font-size:11px;color:var(--tx2);white-space:nowrap}
.done-box{background:var(--okb);border:.5px solid var(--okbd);border-radius:var(--r);padding:12px;text-align:center;font-size:12px;color:var(--ok);font-weight:500;line-height:1.7;white-space:pre-line}
.no-row{font-size:12px;color:var(--tx3);text-align:center;padding:12px 0}
.sugg-hdr{font-size:12px;font-weight:500;color:var(--w);margin-bottom:8px}
.srow{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:var(--r);margin-bottom:5px;border:.5px solid var(--b1)}
.srow:last-child{margin-bottom:0}
.srow.top{border-color:var(--w);background:var(--wb)}
.srank{font-size:10px;color:var(--tx3);min-width:14px;text-align:center}
.spicks{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.spick{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;font-size:10px;color:var(--pc);background:var(--pbg);border:.5px solid var(--pbd)}
.spick img{width:16px;height:16px;border-radius:3px;object-fit:cover;background:var(--s2)}
.scost{font-size:9px;font-weight:700}
.stotal{font-size:11px;color:var(--tx2);white-space:nowrap}
.search-inp{width:100%;padding:7px 10px;font-size:12px;border-radius:var(--r);border:.5px solid var(--b2);background:var(--s2);color:var(--tx);outline:none;margin-bottom:8px}
.search-inp:focus{border-color:rgba(124,106,247,.5)}
.frow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.fb{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:10px;cursor:pointer;background:transparent;border:.5px solid var(--b1);color:var(--tx2);transition:all .1s}
.fb:hover{border-color:var(--b2)}
.fb.fa{background:var(--s2);border-color:var(--b2);color:var(--tx);font-weight:500}
.fb.fr{color:var(--pc);border-color:var(--pbd);background:var(--pbg);font-weight:500}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:5px;max-height:460px;overflow-y:auto;padding-right:2px}
.cgrid::-webkit-scrollbar{width:3px}
.cgrid::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
.cbtn{position:relative;border-radius:var(--r);cursor:pointer;text-align:center;background:var(--s1);border:.5px solid var(--b1);color:var(--tx2);transition:all .12s;overflow:hidden;padding-bottom:5px}
.cbtn:hover{border-color:var(--b2)}
.cbtn.sel{border:1.5px solid var(--pbd);background:var(--pbg);color:var(--pc)}
.cbtn.sug{border:1.5px dashed var(--w);background:var(--wb);color:var(--w)}
.cbtn.opt{border:1.5px solid var(--info);background:var(--infob);color:var(--info)}
.cbar{position:absolute;top:0;left:0;right:0;height:3px}
.cimg-w{width:100%;aspect-ratio:1;overflow:hidden;background:var(--s2)}
.cimg{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform .2s}
.cbtn:hover .cimg{transform:scale(1.05)}
.cname{font-size:9px;font-weight:500;line-height:1.2;margin:3px 3px 0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cmeta{font-size:8px;opacity:.55;margin-top:1px}
.sel-b{position:absolute;top:3px;right:3px;width:13px;height:13px;border-radius:50%;background:var(--pc);display:flex;align-items:center;justify-content:center}
.lbl-sug{position:absolute;top:2px;right:2px;padding:1px 3px;border-radius:3px;font-size:7px;font-weight:700;background:var(--w);color:#000;line-height:1.4}
.lbl-opt{position:absolute;top:2px;right:2px;padding:1px 3px;border-radius:3px;font-size:7px;font-weight:700;background:var(--info);color:#000;line-height:1.4}
.rbetween{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.clr{font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer}
.c1{color:#9ca3af}.c2{color:#4ade80}.c3{color:#60a5fa}.c4{color:#c084fc}.c5{color:#fbbf24}.c7{color:#f97316}
</style>
</head>

// Greedy solver: fast, no DFS, handles multi-region champs.
// For each region combo, pick champs that cover the most gaps first (greedy).
function greedySolve(regionIds, counts, excludeIds, maxG){
  const gaps={};
  regionIds.forEach(rid=>{
    const have=counts[rid]||0;
    gaps[rid]=Math.max(0,(regMap[rid]?.min||1)-have);
  });
  if(Object.values(gaps).every(v=>v===0)) return{picks:[],cost:0,cc:0};
  // Sort candidates: multi-region champs covering most gaps first, then by cost
  const cands=CHAMPS
    .filter(c=>!excludeIds.has(c.id)&&c.r.some(rid=>gaps[rid]>0))
    .sort((a,b)=>{
      const ca=a.r.filter(r=>gaps[r]>0).length;
      const cb=b.r.filter(r=>gaps[r]>0).length;
      return cb-ca||a.c-b.c;
    });
  const rem={...gaps};const picks=[];
  for(const ch of cands){
    if(Object.values(rem).every(v=>v<=0)) break;
    if(ch.r.some(rid=>rem[rid]>0)){
      picks.push(ch);
      ch.r.forEach(rid=>{if(rem[rid]>0) rem[rid]--;});
    }
  }
  if(!Object.values(rem).every(v=>v<=0)) return null; // can't satisfy
  const cost=picks.reduce((s,p)=>s+p.c,0);
  if(maxG<99&&cost>maxG) return null;
  return{picks,cost,cc:picks.length};
}
// Also compute a gold-optimized variant: sort cheapest first within same coverage
function greedySolveGold(regionIds, counts, excludeIds, maxG){
  const gaps={};
  regionIds.forEach(rid=>{
    const have=counts[rid]||0;
    gaps[rid]=Math.max(0,(regMap[rid]?.min||1)-have);
  });
  if(Object.values(gaps).every(v=>v===0)) return{picks:[],cost:0,cc:0};
  const rem={...gaps};const picks=[];
  // Pass 1: multi-region champs sorted cheapest
  const multi=CHAMPS
    .filter(c=>!excludeIds.has(c.id)&&c.r.filter(rid=>gaps[rid]>0).length>1)
    .sort((a,b)=>a.c-b.c);
  for(const ch of multi){
    if(ch.r.some(rid=>rem[rid]>0)){
      picks.push(ch);
      ch.r.forEach(rid=>{if(rem[rid]>0) rem[rid]--;});
    }
  }
  // Pass 2: fill remaining gaps cheapest first
  for(const rid of regionIds){
    let need=rem[rid]||0;
    if(need<=0) continue;
    const fill=CHAMPS
      .filter(c=>!excludeIds.has(c.id)&&!picks.includes(c)&&c.r.includes(rid))
      .sort((a,b)=>a.c-b.c);
    for(const ch of fill){
      if(need<=0) break;
      picks.push(ch); need--;
      ch.r.forEach(r=>{if(rem[r]>0) rem[r]--;});
    }
    if(need>0) return null;
  }
  const cost=picks.reduce((s,p)=>s+p.c,0);
  if(maxG<99&&cost>maxG) return null;
  return{picks,cost,cc:picks.length};
}
function makeParts(picks,rids){

function buildRows(combos, counts, excludeIds, maxG){

    const c=greedySolve(rids,counts,excludeIds,maxG);
