<!DOCTYPE html>
<html lang="vi">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0c14;--bg2:rgba(255,255,255,0.04);--bg3:rgba(255,255,255,0.07);
      --bord:rgba(255,255,255,0.07);--bord2:rgba(255,255,255,0.13);
      --tx:#e8e6f0;--tx2:#8a87a0;--tx3:#4a4860;
      --ok:#4ade80;--ok-bg:rgba(74,222,128,0.1);
      --warn:#fbbf24;--warn-bg:rgba(251,191,36,0.1);
      --info:#93c5fd;--info-bg:rgba(147,197,253,0.1);
      --danger:#f87171;
      --r:10px;--rl:14px;--rxl:18px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(124,106,247,.08) 0%,transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%,rgba(45,212,191,.05) 0%,transparent 60%)}
    #root{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:14px}
    button{outline:none;font-family:'Inter',sans-serif}

    /* Header */
    .hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
      padding:12px 16px;background:var(--bg3);border:.5px solid var(--bord2);
      border-radius:var(--rxl);margin-bottom:12px}
    .hdr-l{display:flex;align-items:center;gap:12px}
    .hdr-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(135deg,rgba(124,106,247,.3),rgba(45,212,191,.2));
      border:.5px solid rgba(124,106,247,.4);display:flex;align-items:center;justify-content:center;font-size:18px}
    .hdr-h1{font-size:14px;font-weight:600}
    .hdr-sub{font-size:11px;color:var(--tx2);margin-top:2px}
    .hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .xp-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .xp-badge.on{background:var(--ok-bg);border:.5px solid rgba(74,222,128,.3);color:var(--ok)}
    .xp-badge.off{background:var(--warn-bg);border:.5px solid rgba(251,191,36,.3);color:var(--warn)}
    .lang-btn{display:flex;border-radius:20px;overflow:hidden;border:.5px solid var(--bord2)}
    .lang-opt{padding:5px 10px;font-size:11px;font-weight:500;cursor:pointer;
      background:transparent;border:none;color:var(--tx2);transition:all .15s}
    .lang-opt.on{background:rgba(124,106,247,.25);color:#a78bfa}

    /* Region progress pills */
    .rpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
    .rpill{display:inline-flex;align-items:center;gap:4px;
      padding:4px 9px;border-radius:20px;font-size:10px;font-weight:500;
      border:.5px solid var(--bord);background:var(--bg2);color:var(--tx3);transition:all .2s}
    .rpill.done{color:var(--pc);background:var(--pbg);border-color:var(--pbd)}
    .rpill.partial{color:var(--warn);background:var(--warn-bg);border-color:rgba(251,191,36,.35)}
    .rpill-count{font-size:9px;font-weight:700;opacity:.8}
    .rpill-min{font-size:9px;opacity:.5}

    /* Layout */
    .layout{display:grid;grid-template-columns:1fr 1.35fr;gap:12px}
    @media(max-width:640px){.layout{grid-template-columns:1fr}}
    .card{background:var(--bg2);border:.5px solid var(--bord);border-radius:var(--rl);padding:12px 14px}
    .card-ttl{font-size:10px;font-weight:600;text-transform:uppercase;
      letter-spacing:.08em;color:var(--tx3);margin-bottom:10px}
    .mb10{margin-bottom:10px}

    /* Emblem buttons */
    .emb-grid{display:flex;flex-wrap:wrap;gap:5px}
    .emb-btn{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:8px;
      font-size:11px;cursor:pointer;background:var(--bg2);border:.5px solid var(--bord);
      color:var(--tx2);transition:all .12s}
    .emb-btn:hover{border-color:var(--bord2);color:var(--tx)}
    .emb-btn.on{color:var(--pc);background:var(--pbg);border-color:var(--pbd);font-weight:500}
    .emb-icon{width:20px;height:20px;border-radius:4px;flex-shrink:0;
      background:var(--pbg);border:.5px solid var(--pbd);
      display:flex;align-items:center;justify-content:center;font-size:11px}

    /* Suggestions */
    .sugg-hdr{font-size:12px;font-weight:500;color:var(--warn);margin-bottom:8px}
    .sugg-row{display:flex;align-items:center;gap:6px;
      padding:7px 9px;border-radius:var(--r);margin-bottom:5px;
      border:.5px solid var(--bord)}
    .sugg-row:last-child{margin-bottom:0}
    .sugg-row.top{border-color:var(--warn);background:var(--warn-bg)}
    .sugg-rank{font-size:10px;color:var(--tx3);min-width:14px;text-align:center}
    .sugg-picks{display:flex;flex-wrap:wrap;gap:4px;flex:1}
    .sugg-pick{display:inline-flex;align-items:center;gap:4px;
      padding:2px 7px;border-radius:6px;font-size:10px;
      color:var(--pc);background:var(--pbg);border:.5px solid var(--pbd)}
    .sugg-pick img{width:16px;height:16px;border-radius:3px;object-fit:cover;background:var(--bg3)}
    .sugg-cost{font-size:9px;font-weight:700}
    .sugg-total{font-size:11px;color:var(--tx2);white-space:nowrap}
    .done-box{background:var(--ok-bg);border:.5px solid rgba(74,222,128,.3);
      border-radius:var(--r);padding:14px;text-align:center;
      font-size:12px;color:var(--ok);font-weight:500;line-height:1.7;white-space:pre-line}
    .no-sugg{font-size:12px;color:var(--tx3);text-align:center;padding:20px 0}

    /* Gold filter */
    .gold-filter{padding:10px 12px;background:var(--bg2);border:.5px solid var(--bord);
      border-radius:var(--r);margin-bottom:10px}
    .gold-filter-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .gold-filter-lbl{font-size:11px;color:var(--tx2)}
    .gold-filter-val{font-size:12px;font-weight:600;color:var(--warn)}
    .gold-filter-btns{display:flex;flex-wrap:wrap;gap:4px}
    .gf-btn{padding:3px 9px;border-radius:6px;font-size:11px;cursor:pointer;
      background:transparent;border:.5px solid var(--bord);color:var(--tx2);transition:all .1s}
    .gf-btn:hover{border-color:var(--bord2)}
    .gf-btn.on{background:var(--warn-bg);border-color:rgba(251,191,36,.4);color:var(--warn);font-weight:500}

    /* Champion grid */
    .search-inp{width:100%;padding:7px 10px;font-size:12px;
      border-radius:var(--r);border:.5px solid var(--bord2);
      background:var(--bg3);color:var(--tx);outline:none;margin-bottom:8px}
    .search-inp:focus{border-color:rgba(124,106,247,.5)}
    .frow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
    .fb{display:flex;align-items:center;gap:3px;
      padding:3px 8px;border-radius:6px;font-size:10px;cursor:pointer;
      background:transparent;border:.5px solid var(--bord);color:var(--tx2);transition:all .1s}
    .fb:hover{border-color:var(--bord2)}
    .fb.fa{background:var(--bg3);border-color:var(--bord2);color:var(--tx);font-weight:500}
    .fb.fr{color:var(--pc);border-color:var(--pbd);background:var(--pbg);font-weight:500}

    .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));
      gap:5px;max-height:450px;overflow-y:auto;padding-right:2px}
    .cgrid::-webkit-scrollbar{width:3px}
    .cgrid::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px}
    .cbtn{position:relative;border-radius:var(--r);cursor:pointer;text-align:center;
      background:var(--bg2);border:.5px solid var(--bord);
      color:var(--tx2);transition:all .12s;overflow:hidden;padding-bottom:5px}
    .cbtn:hover{border-color:var(--bord2)}
    .cbtn.sel{border:1.5px solid var(--pbd);background:var(--pbg);color:var(--pc)}
    .cbtn.sug{border:1.5px dashed var(--warn);background:var(--warn-bg);color:var(--warn)}
    .cbtn.exp{opacity:.45}
    .cbar{position:absolute;top:0;left:0;right:0;height:3px}
    .cimg-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg3);position:relative}
    .cimg{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform .2s}
    .cbtn:hover .cimg{transform:scale(1.05)}
    .cname{font-size:9px;font-weight:500;line-height:1.2;margin:3px 3px 0;
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .cmeta{font-size:8px;opacity:.55;margin-top:1px}
    .cregions{display:flex;justify-content:center;gap:2px;margin-top:1px}
    .creg-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .sel-badge{position:absolute;top:3px;right:3px;
      width:13px;height:13px;border-radius:50%;
      background:var(--pc);display:flex;align-items:center;justify-content:center}
    .sug-lbl{position:absolute;top:2px;right:2px;
      padding:1px 3px;border-radius:3px;font-size:7px;font-weight:700;
      background:var(--warn);color:#000;line-height:1.4}

    .row-btw{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .clr-btn{font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer}
    .c1{color:#9ca3af}.c2{color:#4ade80}.c3{color:#60a5fa}.c4{color:#c084fc}.c5{color:#fbbf24}.c7{color:#f97316}
  </style>
</head>

  {id:'naafiri',n:'Naafiri',     c:2,r:['Shurima']},
  {id:'nasus',  n:'Nasus',       c:3,r:['Shurima'],unlock:true},
  {id:'renekton',n:'Renekton',   c:4,r:['Shurima'],unlock:true},
  {id:'azir',   n:'Azir',        c:5,r:['Shurima']},
  {id:'xerath', n:'Xerath',      c:5,r:['Shurima'],unlock:true},
  // Targon (min 2 — champions are "traitless" but region counts)
  {id:'aphelios',n:'Aphelios',   c:2,r:['Targon']},
  {id:'leona',  n:'Leona',       c:3,r:['Targon']},
  {id:'zoe',    n:'Zoe',         c:3,r:['Targon']},
  {id:'diana',  n:'Diana',       c:4,r:['Targon']},
  {id:'taric',  n:'Taric',       c:4,r:['Targon']},
  {id:'asol',   n:'Aurelion Sol',c:7,r:['Targon'],unlock:true},
  // Void (min 2)
  {id:'kogmaw', n:"Kog'Maw",     c:1,r:['Void']},
  {id:'chogath',n:"Cho'Gath",    c:2,r:['Void']},
  {id:'reksai', n:"Rek'Sai",     c:2,r:['Void'],unlock:true},
  {id:'malzahar',n:'Malzahar',   c:3,r:['Void']},
  {id:'belveth',n:"Bel'Veth",    c:4,r:['Void'],unlock:true},
  {id:'kaisa',  n:"Kai'Sa",      c:4,r:['Void'],unlock:true},
];

const champMap=Object.fromEntries(CHAMPS.map(c=>[c.id,c]));
const GOLD_OPTS=[6,8,10,12,15,99];

function getCounts(sel,emblems){
  const c={};
  REGIONS.forEach(r=>{c[r.id]=0;});
  sel.forEach(id=>{
    const ch=champMap[id];
    if(ch)ch.r.forEach(rid=>{c[rid]=(c[rid]||0)+1;});
  });
  emblems.forEach(rid=>{c[rid]=(c[rid]||0)+1;});
  return c;
}

function combos(arr,k){
  if(k===0)return[[]];
  if(arr.length<k)return[];
  const[f,...rest]=arr;
  return[...combos(rest,k-1).map(c=>[f,...c]),...combos(rest,k)];
}

function analyze(sel,emblems,maxGold){
  const counts=getCounts(sel,emblems);
  // Which regions are active (count >= min)?
  const active=REGIONS.filter(r=>counts[r.id]>=r.min);
  if(active.length>=4)return{done:true,active:active.map(r=>r.id),counts};

  // For each non-active region, compute cheapest way to activate it
  // (considering already-on-board champs that don't yet count toward this region)
  const notActive=REGIONS.filter(r=>counts[r.id]<r.min);
  
  // For each not-active region, find cheapest picks needed
  const regionCost={};
  notActive.forEach(reg=>{
    const alreadyHave=counts[reg.id]||0;
    const need=reg.min-alreadyHave;
    // Available champs from this region not yet on board
    const avail=CHAMPS.filter(c=>c.r.includes(reg.id)&&!sel.has(c.id))
      .sort((a,b)=>a.c-b.c);
    if(avail.length<need){regionCost[reg.id]=null;return;}
    const picks=avail.slice(0,need);
    regionCost[reg.id]={picks,cost:picks.reduce((s,p)=>s+p.c,0),need};
  });

  const stillNeed=4-active.length;
  // Generate combos of regions to activate
  const candidates=notActive.filter(r=>regionCost[r.id]!==null);
  const allCombos=combos(candidates,stillNeed)
    .map(combo=>{
      const parts=combo.map(r=>regionCost[r.id]);
      const total=parts.reduce((s,p)=>s+p.cost,0);
      if(maxGold<99&&total>maxGold)return null;
      return{regions:combo.map(r=>r.id),parts,total};
    })
    .filter(Boolean)
    .sort((a,b)=>a.total-b.total)
    .slice(0,8);

  return{done:false,active:active.map(r=>r.id),counts,need:stillNeed,suggs:allCombos};
}

// ── ChampImg ──────────────────────────────────────────
function ChampImg({id,size='100%',radius=0}){
  const[err,setErr]=useState(false);
  const url=DDR_MAP[id]?DDR+DDR_MAP[id]+'.png':null;
  const ch=champMap[id];
  const rg=ch?regMap[ch.r[0]]:null;
  if(!url||err)return h('div',{style:{width:size,height:size,borderRadius:radius,
    background:rg?.bg||'rgba(255,255,255,.05)',display:'flex',
    alignItems:'center',justifyContent:'center',fontSize:16}},rg?.icon||'?');
  return h('img',{src:url,alt:id,
    style:{width:size,height:size,borderRadius:radius,objectFit:'cover',
      objectPosition:'top',display:'block'},
    onError:()=>setErr(true)});
}

function App(){
  const[lang,setLang]=useState('vi');
  const[sel,setSel]=useState(new Set());
  const[emblems,setEmblems]=useState(new Set());
  const[filterR,setFilterR]=useState('all');
  const[search,setSearch]=useState('');
  const[maxGold,setMaxGold]=useState(99);
  const t=T[lang];

  const result=useMemo(()=>analyze(sel,emblems,maxGold),[sel,emblems,maxGold]);
  const counts=useMemo(()=>getCounts(sel,emblems),[sel,emblems]);
  const topIds=useMemo(()=>{
    if(result.done||!result.suggs?.length)return new Set();
    return new Set(result.suggs[0].parts.flatMap(p=>p.picks.map(c=>c.id)));
  },[result]);

  const filtered=useMemo(()=>CHAMPS.filter(c=>
    (filterR==='all'||c.r.includes(filterR))&&
    (!search||c.n.toLowerCase().includes(search.toLowerCase()))
  ),[filterR,search]);

  const toggle=useCallback(id=>setSel(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;}),[]);
  const toggleE=useCallback(r=>setEmblems(p=>{const n=new Set(p);n.has(r)?n.delete(r):n.add(r);return n;}),[]);
  const clearAll=()=>{setSel(new Set());setEmblems(new Set());};

  const rname=r=>lang==='vi'?r.vi:r.en;
  const activeCount=result.active?.length||0;

  return h('div',null,
    // Header
    h('div',{className:'hdr'},
      h('div',{className:'hdr-l'},
        h('div',{className:'hdr-icon'},'⚡'),
        h('div',null,h('div',{className:'hdr-h1'},t.title),h('div',{className:'hdr-sub'},t.sub))
      ),
      h('div',{className:'hdr-r'},
        h('div',{className:'xp-badge '+(activeCount>=4?'on':'off')},
          activeCount>=4?t.xpOn:t.xpOff(activeCount)
        ),
        h('div',{className:'lang-btn'},
          h('button',{className:'lang-opt'+(lang==='vi'?' on':''),onClick:()=>setLang('vi')},'VI'),
          h('button',{className:'lang-opt'+(lang==='en'?' on':''),onClick:()=>setLang('en')},'EN')
        )
      )
    ),

    // Region progress pills
    h('div',{className:'rpills'},
      REGIONS.map(r=>{
        const cnt=counts[r.id]||0;
        const isDone=cnt>=r.min;
        const isPartial=cnt>0&&!isDone;
        const cls='rpill'+(isDone?' done':isPartial?' partial':'');
        const st=isDone?{'--pc':r.color,'--pbg':r.bg,'--pbd':r.bd}:{};
        return h('div',{key:r.id,className:cls,style:st},
          r.icon,' ',rname(r),' ',
          h('span',{className:'rpill-count'},cnt),
          h('span',{className:'rpill-min'},'/'+r.min)
        );
      })
    ),

    h('div',{className:'layout'},

      // Left col
      h('div',null,
        // Emblems
        h('div',{className:'card mb10'},
          h('div',{className:'card-ttl'},t.emblems),
          h('div',{className:'emb-grid'},
            REGIONS.map(r=>{
              const on=emblems.has(r.id);
              return h('button',{key:r.id,
                className:'emb-btn'+(on?' on':''),
                style:{'--pc':r.color,'--pbg':r.bg,'--pbd':r.bd},
                onClick:()=>toggleE(r.id)},
                h('span',{className:'emb-icon',style:{'--pbg':r.bg,'--pbd':r.bd}},r.icon),
                (lang==='vi'?t.empfx:'')+rname(r)
              );
            })
          )
        ),

        // Gold filter
        h('div',{className:'gold-filter mb10'},
          h('div',{className:'gold-filter-top'},
            h('span',{className:'gold-filter-lbl'},t.goldFilter),
            h('span',{className:'gold-filter-val'},maxGold>=99?t.goldAll:maxGold+t.gold)
          ),
          h('div',{className:'gold-filter-btns'},
            GOLD_OPTS.map(g=>h('button',{key:g,
              className:'gf-btn'+(maxGold===g?' on':''),
              onClick:()=>setMaxGold(g)},
              g>=99?t.goldAll:('≤'+g+t.gold)
            ))
          )
        ),

        // Suggestions
        h('div',{className:'card'},
          result.done
            ? h('div',{className:'done-box'},t.done)
            : h('div',null,
                h('div',{className:'sugg-hdr'},
                  result.need?t.need(result.need)+' — '+t.suggs:t.suggs
                ),
                result.suggs?.length
                  ? result.suggs.map((sg,i)=>
                      h('div',{key:i,className:'sugg-row'+(i===0?' top':'')},
                        h('span',{className:'sugg-rank'},i===0?'★':i+1),
                        h('div',{className:'sugg-picks'},
                          sg.parts.flatMap(p=>p.picks).map(ch=>{
                            const rg=regMap[ch.r[0]];
                            return h('div',{key:ch.id,className:'sugg-pick',
                              style:{'--pc':rg.color,'--pbg':rg.bg,'--pbd':rg.bd}},
                              h(ChampImg,{id:ch.id,size:'16px',radius:3}),
                              h('span',{className:'sugg-cost '+CC[ch.c]},ch.c+'★'),
                              ch.n,
                              ch.r.length>1&&h('span',{style:{fontSize:8,opacity:.6}},' ✦'),
                              h('span',{style:{fontSize:9,opacity:.55}},' '+rg.icon)
                            );
                          })
                        ),
                        h('span',{className:'sugg-total'},sg.total+t.gold)
                      )
                    )
                  : h('div',{className:'no-sugg'},
                      result.suggs&&result.suggs.length===0&&maxGold<99
                        ? (lang==='vi'?'Không có combo ≤'+maxGold+t.gold+'. Thử tăng giới hạn.':'No combos ≤'+maxGold+t.gold+'. Try raising the limit.')
                        : t.noSugg
                    )
              )
        )
      ),

      // Right col: champ grid
      h('div',{className:'card'},
        h('div',{className:'row-btw'},
          h('div',{className:'card-ttl',style:{margin:0}},t.panel(sel.size)),
          (sel.size+emblems.size>0)&&h('button',{className:'clr-btn',onClick:clearAll},t.clear)
        ),
        h('input',{className:'search-inp',placeholder:t.search,
          value:search,onChange:e=>setSearch(e.target.value)}),
        h('div',{className:'frow'},
          h('button',{className:'fb'+(filterR==='all'?' fa':''),onClick:()=>setFilterR('all')},t.all),
          REGIONS.map(r=>h('button',{key:r.id,
            className:'fb'+(filterR===r.id?' fr':''),
            style:filterR===r.id?{'--pc':r.color,'--pbg':r.bg,'--pbd':r.bd}:{},
            onClick:()=>setFilterR(filterR===r.id?'all':r.id)},
            r.icon,' ',rname(r),' ',
            h('span',{style:{fontSize:9,opacity:.6,marginLeft:1}},
              (counts[r.id]||0)+'/'+r.min
            )
          ))
        ),
        h('div',{className:'cgrid'},
          filtered.map(ch=>{
            const isSel=sel.has(ch.id);
            const isSug=topIds.has(ch.id)&&!isSel;
            const rg=regMap[ch.r[0]];
            return h('button',{key:ch.id,
              className:'cbtn'+(isSel?' sel':isSug?' sug':ch.unlock?' exp':''),
              style:{'--pc':rg.color,'--pbg':rg.bg,'--pbd':rg.bd},
              onClick:()=>toggle(ch.id),
              title:ch.unlock?(lang==='vi'?'Cần mở khóa':'Needs unlock'):ch.n
            },
              h('div',{className:'cbar',style:{background:CB[ch.c]}}),
              h('div',{className:'cimg-wrap'},h(ChampImg,{id:ch.id,size:'100%'})),
              h('div',{className:'cname'},ch.n),
              h('div',{className:'cmeta'},
                h('span',{className:CC[ch.c]},'★'.repeat(Math.min(ch.c,5))),
                ' ',
                // Show region dots if multi-region
                ch.r.length>1
                  ? h('span',{style:{fontSize:8}}, ch.r.map(rid=>regMap[rid]?.icon).join(''))
                  : rg.icon
              ),
              isSel&&h('div',{className:'sel-badge'},
                h('svg',{viewBox:'0 0 10 10',width:8,height:8},
                  h('polyline',{points:'2,5 4,8 8,2',stroke:'#000',strokeWidth:1.5,fill:'none',strokeLinecap:'round'})
                )
              ),
              isSug&&h('div',{className:'sug-lbl'},lang==='vi'?'GỢI Ý':'PICK'),
              ch.unlock&&!isSel&&h('div',{style:{position:'absolute',bottom:3,right:3,fontSize:8}},'🔒')
            );
          })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
